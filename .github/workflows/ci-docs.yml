name: CI Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-docs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-docs.yml'
  workflow_dispatch:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run -w ./docs lint:check

      - name: Lint Markdown
        run: npm run -w ./docs lint:md

      - name: Check links
        run: npm run -w ./docs test:links

      - name: Format check
        run: npm run -w ./docs format:check

      - name: Build
        run: npm run -w ./docs build
