name: CI API

on:
  pull_request:
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-api.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-api.yml'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mosbot_test
          POSTGRES_USER: mosbot
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mosbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: mosbot_test
      DB_USER: mosbot
      DB_PASSWORD: test-password
      JWT_SECRET: ci-test-secret-not-used-in-production
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -w ./api lint

      - name: Run migrations
        run: npm run -w ./api migrate

      - name: Run tests with coverage
        run: npm run -w ./api test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: api/coverage/lcov.info
          format: lcov
          fail-on-error: false
