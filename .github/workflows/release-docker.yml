name: Docker Release

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (e.g., mosbot-api)'
        required: true
        type: string
      context:
        description: 'Docker build context directory (e.g., ./api)'
        required: true
        type: string
      target:
        description: 'Docker build target stage'
        required: false
        type: string
        default: ''
      tag_prefix:
        description: 'Tag prefix to strip for semver (e.g., api-v)'
        required: true
        type: string
      create_release:
        description: 'Whether to create a GitHub Release'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#${{ inputs.tag_prefix }}}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          target: ${{ inputs.target || '' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,scope=${{ inputs.image_name }},mode=max

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
