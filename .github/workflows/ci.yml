name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  api:
    name: API - lint, test, coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mosbot_test
          POSTGRES_USER: mosbot
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mosbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: mosbot_test
      DB_USER: mosbot
      DB_PASSWORD: test-password
      JWT_SECRET: ci-test-secret-not-used-in-production
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -w ./api lint

      - name: Migrate
        run: npm run -w ./api migrate

      - name: Test with coverage
        run: npm run -w ./api test:coverage

      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: api/coverage/lcov.info
          format: lcov
          flag-name: api
          parallel: true
          fail-on-error: false
          allow-empty: true

  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Web - lint, test, build
            component: web
          - name: Docs - lint, build, validate
            component: docs
          - name: Workspace - format, test
            component: workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --- Web ---
      - name: Web lint
        if: matrix.component == 'web'
        run: npm run -w ./web lint

      - name: Web test coverage
        if: matrix.component == 'web'
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: MosBot
        run: npm run -w ./web test:coverage

      - name: Web coveralls
        if: matrix.component == 'web'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: web/coverage/lcov.info
          format: lcov
          flag-name: web
          parallel: true
          fail-on-error: false
          allow-empty: true

      - name: Web build
        if: matrix.component == 'web'
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: MosBot
        run: npm run -w ./web build

      # --- Docs ---
      - name: Docs lint JavaScript
        if: matrix.component == 'docs'
        run: npm run -w ./docs lint:check

      - name: Docs lint Markdown
        if: matrix.component == 'docs'
        run: npm run -w ./docs lint:md

      - name: Docs check links
        if: matrix.component == 'docs'
        run: npm run -w ./docs test:links

      - name: Docs format check
        if: matrix.component == 'docs'
        run: npm run -w ./docs format:check

      - name: Docs build
        if: matrix.component == 'docs'
        run: npm run -w ./docs build

      # --- Workspace ---
      - name: Workspace format check
        if: matrix.component == 'workspace'
        run: npm run -w ./workspace-server format:check

      - name: Workspace test coverage
        if: matrix.component == 'workspace'
        run: npm run -w ./workspace-server test:coverage

      - name: Workspace coveralls
        if: matrix.component == 'workspace'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: workspace-server/coverage/lcov.info
          format: lcov
          flag-name: workspace
          parallel: true
          fail-on-error: false
          allow-empty: true

  coverage-finalize:
    name: Finalize coverage
    needs: [api, checks]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Finalize Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
