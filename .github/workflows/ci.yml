name: CI (PR)

# Runs on pull requests to any branch. Enforces lint, tests, and 100% code coverage.

on:
  pull_request:
    branches: ['**']

jobs:
  lint-and-test:
    name: Lint, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: MosBot

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api/v1
          VITE_APP_NAME: MosBot

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
