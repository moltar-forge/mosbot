name: CI (PR)

# Runs on pull requests to any branch. Enforces lint and build.
# Also includes documentation quality checks.

on:
  pull_request:
    branches: ['**']

jobs:
  lint-and-build:
    name: Lint, Build, and Test Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:check

      - name: Lint Markdown
        run: npm run lint:md

      - name: Check for broken links
        run: npm run test:links

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
