name: CI Workspace Server

on:
  pull_request:
    paths:
      - 'workspace-server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-workspace-server.yml'
  push:
    branches: [main]
    paths:
      - 'workspace-server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-workspace-server.yml'
  workflow_dispatch:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run -w ./workspace-server format:check

      - name: Test with coverage
        run: npm run -w ./workspace-server test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: workspace-server/coverage/lcov.info
          format: lcov
          fail-on-error: false
