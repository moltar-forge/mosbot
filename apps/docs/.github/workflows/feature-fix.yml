name: Test (feature/fix)

# Runs on push to feature/* or fix/* branches. Lint and build only, no deploy.

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
