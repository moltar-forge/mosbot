# docker-compose.override.yml — auto-loaded in dev (committed for local dev convenience)
#
# Swaps the production nginx dashboard for a Vite dev server with HMR.
# Source is bind-mounted so every file save reflects instantly in the browser.
#
# Usage:
#   dev   →  make up (or docker compose up)                  (this file is merged automatically)
#   prod  →  make up-prod (or docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build)

services:
  dashboard:
    build:
      target: development
      args: {}
    container_name: mosbot-dashboard-dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
      VITE_APP_NAME: ${VITE_APP_NAME:-MosBot}
    # Override ports entirely: drop the prod nginx :80 binding, expose Vite on :5173
    ports:
      - "5173:5173"
    volumes:
      - ../mosbot-dashboard:/app
      - /app/node_modules
